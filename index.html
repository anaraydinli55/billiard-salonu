<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristokrat | Bilyard Tennis Klub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(57, 255, 20, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a3a12 0%, #050505 80%);
            min-height: 100vh;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1609132718484-cc90df3417f8?q=80&w=2070') center/cover no-repeat;
            opacity: 0.1;
            z-index: -1;
            filter: grayscale(100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        header {
            padding: 3rem 0;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            padding-left: 8px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-green);
            width: 100%;
            display: inline-block;
        }

        .subtitle {
            color: var(--neon-green);
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 2.5rem;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Baku saati göstergesi */
        .baku-clock {
            display: inline-block;
            background: rgba(57, 255, 20, 0.08);
            border: 1px solid rgba(57, 255, 20, 0.25);
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 0.8rem;
            color: var(--neon-green);
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
        }

        .user-info {
            margin-bottom: 3rem;
        }

        .user-info input {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 18px 30px;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            width: 100%;
            max-width: 400px;
            outline: none;
            text-align: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .user-info input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 25px rgba(57, 255, 20, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 2rem;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .table-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--neon-green);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(57, 255, 20, 0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card-content {
            padding: 20px;
        }

        .table-card h3 {
            margin-bottom: 5px;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .table-card p {
            font-size: 0.85rem;
            opacity: 0.6;
            color: var(--neon-green);
            margin-bottom: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(57, 255, 20, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
            text-transform: uppercase;
        }

        .occupied {
            border-color: #ff4444 !important;
            color: #ff4444 !important;
            background: rgba(255, 68, 68, 0.1) !important;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #0a0a0a;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--neon-green);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.2);
            position: relative;
        }

        /* Aktif WA nömrəsi göstəricisi */
        .wa-indicator {
            text-align: center;
            font-size: 0.72rem;
            color: #888;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid #222;
        }

        .wa-indicator span {
            color: var(--neon-green);
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-green);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        select, input[type="time"] {
            width: 100%;
            padding: 15px;
            background: #151515;
            border: 1px solid #333;
            color: white;
            border-radius: 12px;
            outline: none;
            font-size: 1rem;
        }

        .btn-reserve {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.4);
            transition: var(--transition);
        }

        .btn-reserve:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px var(--neon-green);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            font-size: 2rem;
            color: #555;
        }

        .timeline {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #aaa;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 10px;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
                letter-spacing: 2px;
                padding-left: 2px;
            }
            .subtitle {
                font-size: 0.75rem;
                letter-spacing: 2px;
            }
            .container { padding: 1rem 0.5rem; }
            .modal-content { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <header>
            <h1>ARISTOKRAT</h1>
            <p class="subtitle">Bilyard Tennis Klub</p>

            <!-- Baku saati göstəricisi -->
            <div class="baku-clock" id="bakuClock">🕐 ŞƏKİ: --:--</div>

            <div class="user-info">
                <input type="text" id="customerName" placeholder="ADINIZI DAXİL EDİN..." required>
            </div>

            <button class="btn-reserve" onclick="scrollToTables()" style="width: auto; padding: 18px 50px;">REZERV EDİN</button>
        </header>

        <div id="tables-section" class="tables-grid">
            <!-- Masa 1 -->
            <div class="table-card" onclick="openModal('Masa 1 (Rus Bilyardı)')">
                <div class="card-image">
                    <img src="billiard17.jpeg" alt="Masa 1">
                </div>
                <div class="card-content">
                    <h3>Masa 1</h3>
                    <p>Rus Bilyardı</p>
                    <div id="status-Masa-1" class="status-badge">Mövcuddur</div>
                    <div id="time-Masa-1" class="timeline"></div>
                </div>
            </div>

            <!-- Masa 2 -->
            <div class="table-card" onclick="openModal('Masa 2 (Rus Bilyardı)')">
                <div class="card-image">
                    <img src="billiard12.jpeg" alt="Masa 2">
                </div>
                <div class="card-content">
                    <h3>Masa 2</h3>
                    <p>Rus Bilyardı</p>
                    <div id="status-Masa-2" class="status-badge">Mövcuddur</div>
                    <div id="time-Masa-2" class="timeline"></div>
                </div>
            </div>

            <!-- Masa 3 -->
            <div class="table-card" onclick="openModal('Masa 3 (Rus Bilyardı)')">
                <div class="card-image">
                    <img src="billiard11.jpeg" alt="Masa 3">
                </div>
                <div class="card-content">
                    <h3>Masa 3</h3>
                    <p>Rus Bilyardı</p>
                    <div id="status-Masa-3" class="status-badge">Mövcuddur</div>
                    <div id="time-Masa-3" class="timeline"></div>
                </div>
            </div>

            <!-- Masa 4 -->
            <div class="table-card" onclick="openModal('Masa 4 (Amerikan Pool)')">
                <div class="card-image">
                    <img src="billiard4.jpg" alt="Masa 4">
                </div>
                <div class="card-content">
                    <h3>Masa 4</h3>
                    <p>Amerikan Pool</p>
                    <div id="status-Masa-4" class="status-badge">Mövcuddur</div>
                    <div id="time-Masa-4" class="timeline"></div>
                </div>
            </div>

            <!-- Tennis -->
            <div class="table-card" onclick="openModal('Tennis 1')">
                <div class="card-image">
                    <img src="tennis2.png" alt="Tennis 1">
                </div>
                <div class="card-content">
                    <h3>Tennis 1</h3>
                    <p>Masa Tennisi</p>
                    <div id="status-Tennis-1" class="status-badge">Mövcuddur</div>
                    <div id="time-Tennis-1" class="timeline"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Rezervasyon Paneli (Modal) -->
    <div id="resModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--neon-green); margin-bottom: 15px; text-transform: uppercase;">Rezervasiya</h2>

            <!-- Aktiv WhatsApp nömrəsi göstəricisi -->
            <div class="wa-indicator" id="waIndicator">
                📲 Mesaj göndəriləcək: <span id="waNumberDisplay">yüklənir...</span>
            </div>

            <div class="form-group">
                <label>Başlanğıc Saatı (12:00 - 00:00)</label>
                <input type="time" id="startTime" min="12:00" max="23:59" value="20:00">
            </div>

            <div class="form-group">
                <label>Müddət (Saat)</label>
                <select id="durationHours">
                    <option value="1">1 Saat</option>
                    <option value="2">2 Saat</option>
                    <option value="3">3 Saat</option>
                </select>
            </div>

            <div class="form-group">
                <label>Əlavə Dəqiqə</label>
                <select id="durationMinutes">
                    <option value="10" selected>10 dəqiqə</option>
                    <option value="20">20 dəqiqə</option>
                    <option value="30">30 dəqiqə</option>
                    <option value="40">40 dəqiqə</option>
                    <option value="50">50 dəqiqə</option>
                </select>
            </div>

            <button class="btn-reserve" onclick="completeReservation()">Rezervasiyanı Tamamla</button>
        </div>
    </div>

    <script>
        // ─── WHATSAPP NÖMRƏLƏRI ───────────────────────────────────────────────
        // 19:00-dan əvvəl bu nömrəyə göndərilir (gündüz)
        const WA_DAY   = '994515525200';   // <-- buraya gündüz nömrəsini yazın

        // 19:00-dan sonra bu nömrəyə göndərilir (gecə)
        const WA_NIGHT = '994557727557';   // <-- gecə nömrəsi

        // ─── BAKU SAATI (UTC+4) ──────────────────────────────────────────────
        function getBakuTime() {
            const now = new Date();
            const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
            return new Date(utcMs + 4 * 3600000); // UTC+4
        }

        function getBakuDateString() {
            const b = getBakuTime();
            return b.getFullYear() + '-' +
                   String(b.getMonth() + 1).padStart(2, '0') + '-' +
                   String(b.getDate()).padStart(2, '0');
        }

        // Aktiv nömrəni seç (Baku saatına görə)
        function getActiveWA() {
            const bakuHour = getBakuTime().getHours();
            return bakuHour < 19 ? WA_DAY : WA_NIGHT;
        }

        // ─── GÜNDƏLİK SIFIRLANMA (Baku 24:00) ───────────────────────────────
        function checkDailyReset() {
            const todayBaku = getBakuDateString();
            const storedDate = localStorage.getItem('billiard_last_date');

            if (storedDate !== todayBaku) {
                // Yeni gün: rezervasiyaları sıfırla
                localStorage.removeItem('billiard_reservations');
                localStorage.setItem('billiard_last_date', todayBaku);
                return true; // sıfırlandı
            }
            return false;
        }

        // ─── STATE ────────────────────────────────────────────────────────────
        let selectedTable = "";
        checkDailyReset();
        let reservations = JSON.parse(localStorage.getItem('billiard_reservations')) || [];

        // ─── SAAT GÖSTƏRİCİSİ ────────────────────────────────────────────────
        function updateClock() {
            const b = getBakuTime();
            const hh = String(b.getHours()).padStart(2, '0');
            const mm = String(b.getMinutes()).padStart(2, '0');
            const ss = String(b.getSeconds()).padStart(2, '0');
            document.getElementById('bakuClock').textContent = '🕐 ŞƏKİ: ' + hh + ':' + mm + ':' + ss;

            // Gecə yarısı sıfırlanma — saniyə dəqiqliyi ilə
            if (hh === '00' && mm === '00' && ss === '00') {
                if (checkDailyReset()) {
                    reservations = [];
                    updateUI();
                }
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ─── KÖMƏKÇI FUNKSİYALAR ─────────────────────────────────────────────
        function scrollToTables() {
            document.getElementById('tables-section').scrollIntoView({ behavior: 'smooth' });
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToTime(totalMinutes) {
            const h = Math.floor(totalMinutes / 60) % 24;
            const m = totalMinutes % 60;
            return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }

        function checkConflict(tableName, startMins, endMins) {
            return reservations.some(res => {
                if (res.table !== tableName) return false;
                const resStart = timeToMinutes(res.start);
                const resEnd   = timeToMinutes(res.end);
                return (startMins < resEnd && endMins > resStart);
            });
        }

        // ─── MODAL AÇ ─────────────────────────────────────────────────────────
        function openModal(tableName) {
            const name = document.getElementById('customerName').value.trim();
            if (!name) {
                alert("Zəhmət olmasa əvvəlcə adınızı daxil edin!");
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            selectedTable = tableName;
            document.getElementById('modalTitle').innerText = tableName;

            // Aktiv WA nömrəsini göstər
            const activeWA = getActiveWA();
            const bakuHour = getBakuTime().getHours();
            const session  = bakuHour < 19 ? 'Gündüz (12:00–19:00)' : 'Gecə (19:00–00:00)';
            document.getElementById('waNumberDisplay').textContent = '+' + activeWA + ' · ' + session;

            document.getElementById('resModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resModal').style.display = 'none';
        }

        // ─── REZERVASİYANI TAMAMLA ────────────────────────────────────────────
        function completeReservation() {
            const name   = document.getElementById('customerName').value.trim();
            const start  = document.getElementById('startTime').value;
            const dHours = parseInt(document.getElementById('durationHours').value);
            const dMins  = parseInt(document.getElementById('durationMinutes').value);

            if (!start) { alert("Zəhmət olmasa saat seçin!"); return; }

            const startTotalMins    = timeToMinutes(start);
            const durationTotalMins = dHours * 60 + dMins;
            const endTotalMins      = startTotalMins + durationTotalMins;
            const end               = minutesToTime(endTotalMins);

            // İş saatları yoxlaması
            if (startTotalMins < 9 * 60) {
                alert("Müəssisə saat 12:00-da açılır.");
                return;
            }
            if (endTotalMins > 24 * 60) {
                alert("Bitmə saatı 00:00-ı keçə bilməz. Müddəti azaldın.");
                return;
            }

            // Üst-üstə düşmə yoxlaması
            if (checkConflict(selectedTable, startTotalMins, endTotalMins)) {
                alert("Bu vaxt aralığı artıq doludur! Zəhmət olmasa başqa vaxt seçin.");
                return;
            }

            const durStr = dHours + ' saat ' + dMins + ' dəq';

            const newReservation = {
                customer : name,
                table    : selectedTable,
                start    : start,
                duration : durStr,
                end      : end
            };

            reservations.push(newReservation);
            localStorage.setItem('billiard_reservations', JSON.stringify(reservations));

            // ─── WHATSAPP YÖNLƏNDİRMƏ (Baku saatına görə) ───────────────────
            // 19:00-dan əvvəl  → WA_DAY nömrəsinə
            // 19:00-dan sonra  → WA_NIGHT nömrəsinə
            const targetWA = getActiveWA();

            const msg = encodeURIComponent(
                'Salam, ' + selectedTable + ' üçün rezervasiya etmək istəyirəm.\n' +
                'Ad: ' + name + '\n' +
                'Başlanğıc: ' + start + '\n' +
                'Müddət: ' + durStr + '\n' +
                'Bitiş: ' + end
            );

            window.open('https://wa.me/' + targetWA + '?text=' + msg, '_blank');

            updateUI();
            closeModal();
        }

        // ─── UI YENİLƏNMƏSİ ──────────────────────────────────────────────────
        function updateUI() {
            document.querySelectorAll('.status-badge').forEach(el => {
                el.innerText = "Mövcuddur";
                el.classList.remove('occupied');
            });
            document.querySelectorAll('.timeline').forEach(el => el.innerHTML = "");

            reservations.forEach(res => {
                const cleanId  = res.table.includes('Tennis')
                    ? 'Tennis-1'
                    : 'Masa-' + res.table.match(/\d+/)[0];

                const statusEl = document.getElementById('status-' + cleanId);
                const timeEl   = document.getElementById('time-'   + cleanId);

                if (statusEl) {
                    statusEl.innerText = "REZERV OLUNUB";
                    statusEl.classList.add('occupied');
                }
                if (timeEl) {
                    const d   = document.createElement('div');
                    d.innerText = res.start + ' – ' + res.end + ' (' + res.customer + ')';
                    timeEl.appendChild(d);
                }
            });
        }

        // ─── BAŞLANĞIC ────────────────────────────────────────────────────────
        window.onload = updateUI;

        window.onclick = function(e) {
            if (e.target === document.getElementById('resModal')) closeModal();
        };
    </script>
</body>
</html>

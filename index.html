<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Billiards | Premium Lounge</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(57, 255, 20, 0.2);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a3a12 0%, #050505 80%);
            min-height: 100vh;
        }

        /* Background Visual Overlay */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1544197150-b99a580bb7a8?auto=format&fit=crop&q=80&w=2070') center/cover no-repeat;
            opacity: 0.15;
            z-index: -1;
            filter: grayscale(100%) brightness(50%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
        }

        header {
            padding: 4rem 0;
            animation: fadeInDown 1s ease;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px var(--neon-green);
        }

        .subtitle {
            color: var(--neon-green);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        /* Input Section */
        .user-info {
            margin-bottom: 3rem;
        }

        .user-info input {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            width: 300px;
            outline: none;
            text-align: center;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        .user-info input:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
        }

        /* Table Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 2rem;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .table-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-green);
            box-shadow: 0 10px 30px rgba(57, 255, 20, 0.2);
        }

        .table-card h3 {
            margin-bottom: 10px;
            font-size: 1.5rem;
        }

        .table-card p {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .status-badge {
            margin-top: 15px;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: rgba(57, 255, 20, 0.1);
            color: var(--neon-green);
            border: 1px solid var(--neon-green);
        }

        .occupied {
            border-color: #ff4444 !important;
            color: #ff4444 !important;
            background: rgba(255, 68, 68, 0.1) !important;
        }

        /* Modal / Reservation Panel */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #111;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--neon-green);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--neon-green);
            font-size: 0.9rem;
        }

        select, input[type="time"] {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        .btn-reserve {
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 20px;
            box-shadow: 0 0 20px var(--neon-green);
            transition: var(--transition);
        }

        .btn-reserve:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px var(--neon-green);
        }

        .close-modal {
            float: right;
            cursor: pointer;
            font-size: 1.5rem;
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Schedule Timeline */
        .timeline {
            margin-top: 15px;
            font-size: 0.7rem;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .user-info input { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <header>
            <h1>NEON CUE</h1>
            <p class="subtitle">PREMIUM BILLIARD & LOUNGE</p>
            
            <div class="user-info">
                <input type="text" id="customerName" placeholder="Adınızı Daxil Edin..." required>
            </div>

            <button class="btn-reserve" onclick="scrollToTables()" style="width: auto; padding: 15px 40px;">RESERVE NOW</button>
        </header>

        <div id="tables-section" class="tables-grid">
            <!-- Table 1-3 Russian -->
            <div class="table-card" onclick="openModal('Masa 1 (Rus Bilyardı)')">
                <h3>Masa 1</h3>
                <p>Rus Bilyardı</p>
                <div id="status-Masa-1" class="status-badge">Mövcuddur</div>
                <div id="time-Masa-1" class="timeline"></div>
            </div>
            <div class="table-card" onclick="openModal('Masa 2 (Rus Bilyardı)')">
                <h3>Masa 2</h3>
                <p>Rus Bilyardı</p>
                <div id="status-Masa-2" class="status-badge">Mövcuddur</div>
                <div id="time-Masa-2" class="timeline"></div>
            </div>
            <div class="table-card" onclick="openModal('Masa 3 (Rus Bilyardı)')">
                <h3>Masa 3</h3>
                <p>Rus Bilyardı</p>
                <div id="status-Masa-3" class="status-badge">Mövcuddur</div>
                <div id="time-Masa-3" class="timeline"></div>
            </div>
            <!-- Table 4 American -->
            <div class="table-card" onclick="openModal('Masa 4 (Amerikan Pool)')">
                <h3>Masa 4</h3>
                <p>Amerikan Pool</p>
                <div id="status-Masa-4" class="status-badge">Mövcuddur</div>
                <div id="time-Masa-4" class="timeline"></div>
            </div>
            <!-- Tennis -->
            <div class="table-card" onclick="openModal('Tennis 1')">
                <h3>Tennis 1</h3>
                <p>Masa Tennisi</p>
                <div id="status-Tennis-1" class="status-badge">Mövcuddur</div>
                <div id="time-Tennis-1" class="timeline"></div>
            </div>
        </div>
    </div>

    <!-- Reservation Modal -->
    <div id="resModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--neon-green); margin-bottom: 20px;">Rezervasiya</h2>
            
            <div class="form-group">
                <label>Başlanğıc Saatı (09:00 - 00:00)</label>
                <input type="time" id="startTime" min="09:00" max="23:59" value="20:00">
            </div>

            <div class="form-group">
                <label>Saat Müddəti</label>
                <select id="durationHours">
                    <option value="1">1 Saat</option>
                    <option value="2">2 Saat</option>
                    <option value="3">3 Saat</option>
                </select>
            </div>

            <div class="form-group">
                <label>Əlavə Dəqiqələr</label>
                <select id="durationMinutes">
                    <option value="10" selected>10 dəqiqə</option>
                    <option value="20">20 dəqiqə</option>
                    <option value="30">30 dəqiqə</option>
                    <option value="40">40 dəqiqə</option>
                    <option value="50">50 dəqiqə</option>
                </select>
            </div>

            <button class="btn-reserve" onclick="completeReservation()">Rezervasiyanı Tamamla</button>
        </div>
    </div>

    <script>
        let selectedTable = "";
        let reservations = JSON.parse(localStorage.getItem('billiard_reservations')) || [];

        function scrollToTables() {
            document.getElementById('tables-section').scrollIntoView({ behavior: 'smooth' });
        }

        function openModal(tableName) {
            const name = document.getElementById('customerName').value;
            if (!name) {
                alert("Zəhmət olmasa adınızı daxil edin!");
                return;
            }
            selectedTable = tableName;
            document.getElementById('modalTitle').innerText = tableName;
            document.getElementById('resModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('resModal').style.display = 'none';
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function minutesToTime(totalMinutes) {
            let h = Math.floor(totalMinutes / 60) % 24;
            let m = totalMinutes % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        function checkConflict(tableName, startMins, endMins) {
            return reservations.some(res => {
                if (res.table !== tableName) return false;
                const resStart = timeToMinutes(res.start);
                const resEnd = timeToMinutes(res.end);
                // Çakışma mantığı: (StartA < EndB) AND (EndA > StartB)
                return (startMins < resEnd && endMins > resStart);
            });
        }

        function completeReservation() {
            const name = document.getElementById('customerName').value;
            const start = document.getElementById('startTime').value;
            const dHours = parseInt(document.getElementById('durationHours').value);
            const dMins = parseInt(document.getElementById('durationMinutes').value);
            
            if (!start) return alert("Saat seçin!");

            const startTotalMins = timeToMinutes(start);
            const durationTotalMins = (dHours * 60) + dMins;
            const endTotalMins = startTotalMins + durationTotalMins;
            const end = minutesToTime(endTotalMins);

            // İş saatları kontrolü (09:00 - 00:00)
            if (startTotalMins < 540) { // 09:00
                alert("İş saatlarımız 09:00-da başlayır.");
                return;
            }

            if (checkConflict(selectedTable, startTotalMins, endTotalMins)) {
                alert("Bu saat aralığı artıq rezerv olunub! Zəhmət olmasa başqa vaxt seçin.");
                return;
            }

            const newReservation = {
                customer: name,
                table: selectedTable,
                start: start,
                duration: `${dHours} saat ${dMins} dəqiqə`,
                end: end
            };

            reservations.push(newReservation);
            localStorage.setItem('billiard_reservations', JSON.stringify(reservations));

            // WhatsApp Mesajı
            const msg = `Salam, mən ${selectedTable} rezerv etmək istəyirəm. %0AAd: ${name} %0ABaşlanğıc: ${start} %0AMüddət: ${newReservation.duration} %0ABitiş: ${end}`;
            window.open(`https://wa.me/994554828424?text=${msg}`, '_blank');

            updateUI();
            closeModal();
        }

        function updateUI() {
            // Önce tüm statüleri temizle
            document.querySelectorAll('.status-badge').forEach(el => {
                el.innerText = "Mövcuddur";
                el.classList.remove('occupied');
            });
            document.querySelectorAll('.timeline').forEach(el => el.innerText = "");

            // Mevcut zamanı al (sadece bugünkü rezervasyonlar gibi düşünelim)
            const now = new Date();
            const currentMins = now.getHours() * 60 + now.getMinutes();

            reservations.forEach(res => {
                const tableId = res.table.split(' ')[0] + '-' + res.table.split(' ')[1]; // ID oluştur
                const cleanId = res.table.includes('Tennis') ? 'Tennis-1' : `Masa-${res.table.match(/\d+/)}`;
                
                const statusEl = document.getElementById(`status-${cleanId}`);
                const timeEl = document.getElementById(`time-${cleanId}`);

                const startM = timeToMinutes(res.start);
                const endM = timeToMinutes(res.end);

                if (statusEl) {
                    statusEl.innerText = "REZERV OLUNUB";
                    statusEl.classList.add('occupied');
                }
                if (timeEl) {
                    timeEl.innerHTML += `<div>${res.start} - ${res.end}</div>`;
                }
            });
        }

        // Sayfa yüklendiğinde UI güncelle
        window.onload = updateUI;

        // Modal dışına tıklandığında kapatma
        window.onclick = function(event) {
            if (event.target == document.getElementById('resModal')) closeModal();
        }
    </script>
</body>
</html>

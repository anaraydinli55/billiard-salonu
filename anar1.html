<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristokrat | Premium Billiard Lounge</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(57, 255, 20, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a3a12 0%, #050505 80%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; text-align: center; }

        /* Header Neon */
        h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--neon-green);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--neon-green);
            margin-bottom: 2rem;
        }

        .user-info input {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 18px 30px;
            border-radius: 15px;
            color: white;
            width: 100%;
            max-width: 400px;
            text-align: center;
            outline: none;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
        }

        /* Tables Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 2rem;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
        }

        .table-card:hover { transform: translateY(-10px); border-color: var(--neon-green); }

        .card-image { width: 100%; height: 180px; overflow: hidden; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }

        .card-content { padding: 20px; }

        .status-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .status-confirmed { border-color: #ff4444; color: #ff4444; background: rgba(255, 68, 68, 0.1); }
        .status-pending { border-color: #ffcc00; color: #ffcc00; background: rgba(255, 204, 0, 0.1); }

        /* Viktoria Reklam - Kiçik və İncə */
        .ad-section {
            margin-top: 5rem;
            text-align: left;
        }

        .google-label {
            font-size: 11px;
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .ad-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .ad-card h2 { font-size: 1.2rem; color: #fff; }
        .ad-card p { font-size: 0.85rem; color: #888; }

        .btn-ad {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-ad:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Footer Neon */
        .footer {
            margin-top: 4rem;
            padding: 30px;
            border-top: 1px solid rgba(57, 255, 20, 0.1);
        }

        .footer p {
            color: var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Admin Panel Section */
        .admin-trigger { margin-top: 50px; opacity: 0.2; cursor: pointer; font-size: 10px; }
        #adminPanel {
            display: none;
            background: #111;
            border: 1px dashed var(--neon-green);
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            text-align: left;
        }

        .res-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #222;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0a0a0a;
            padding: 30px;
            border: 1px solid var(--neon-green);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
        }

        .btn-main {
            background: var(--neon-green);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        select, input[type="time"] {
            width: 100%; padding: 12px; background: #151515; border: 1px solid #333; color: white; border-radius: 8px; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARISTOKRAT</h1>
            <p class="subtitle">Premium Billiard & Lounge</p>
            <div class="user-info">
                <input type="text" id="customerName" placeholder="ADINIZI DAXİL EDİN...">
            </div>
        </header>

        <div class="tables-grid" id="tablesGrid">
            <!-- Masalar JavaScript ile yüklenecek -->
        </div>

        <!-- Viktoria Reklam -->
        <div class="ad-section">
            <p class="google-label">Google Reklam</p>
            <div class="ad-card">
                <div>
                    <h2>Viktoria Paltar Boyaları</h2>
                    <p>Geyimlərinizə yeni həyat verin.</p>
                </div>
                <a href="https://viktoria-az.store" target="_blank" class="btn-ad">SAYTA KEÇİD</a>
            </div>
        </div>

        <footer class="footer">
            <p>Bütün haqları qorunur © 2026 | Aristokrat Brand</p>
            <div class="admin-trigger" onclick="toggleAdmin()">Admin Girişi</div>
            
            <!-- Admin Panel -->
            <div id="adminPanel">
                <h3 style="color: var(--neon-green); margin-bottom: 10px;">Gözləyən Rezervasiyalar</h3>
                <div id="adminList">Yüklənir...</div>
            </div>
        </footer>
    </div>

    <!-- Rezerv Modalı -->
    <div id="resModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--neon-green); margin-bottom: 15px;">Masa Seçin</h2>
            <label>Başlanğıc Saatı</label>
            <input type="time" id="startTime" value="20:00">
            
            <label style="display:block; margin-top:15px;">Müddət</label>
            <select id="duration">
                <option value="60">1 Saat</option>
                <option value="90">1 Saat 30 Dəq</option>
                <option value="120">2 Saat</option>
                <option value="180">3 Saat</option>
            </select>

            <button class="btn-main" onclick="requestReservation()">WhatsApp ilə Bildir</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer; width:100%;">Bağla</button>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        // Bu demo konfiqurasiyadır. Öz Firebase-inizi bağlaya bilərsiniz.
        const firebaseConfig = {
            databaseURL: "https://billiard-aristokrat-default-rtdb.firebaseio.com/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedTableId = null;
        const tables = [
            { id: 1, name: "Masa 1", type: "Rus Bilyardı", img: "billiard1.webp" },
            { id: 2, name: "Masa 2", type: "Rus Bilyardı", img: "billiard2.webp" },
            { id: 3, name: "Masa 3", type: "Rus Bilyardı", img: "billiard3.webp" },
            { id: 4, name: "Masa 4", type: "Amerikan Pool", img: "billiard4.jpg" },
            { id: 5, name: "Tennis 1", type: "Masa Tennisi", img: "tennis.jpg" }
        ];

        // --- MASALARI GÖSTƏR ---
        function renderTables(resData) {
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = '';

            tables.forEach(t => {
                // Bu masa üçün aktiv rezerv varmı?
                const activeRes = Object.values(resData || {}).find(r => r.tableId === t.id && r.status !== 'expired');
                
                let statusHtml = '<span class="status-badge">Mövcuddur</span>';
                if (activeRes) {
                    if (activeRes.status === 'confirmed') {
                        statusHtml = `<span class="status-badge status-confirmed">Rezerv: ${activeRes.start}-${activeRes.end}</span>`;
                    } else {
                        statusHtml = `<span class="status-badge status-pending">Təsdiq Gözləyir...</span>`;
                    }
                }

                grid.innerHTML += `
                    <div class="table-card" onclick="openModal(${t.id}, '${t.name}')">
                        <div class="card-image"><img src="${t.img}"></div>
                        <div class="card-content">
                            <h3>${t.name}</h3>
                            <p>${t.type}</p>
                            ${statusHtml}
                        </div>
                    </div>
                `;
            });
        }

        // --- REAL-TIME DATA ---
        db.ref('reservations').on('value', (snapshot) => {
            const data = snapshot.val();
            renderTables(data);
            renderAdminList(data);
        });

        // --- MODAL İŞLƏRİ ---
        function openModal(id, name) {
            const customer = document.getElementById('customerName').value;
            if(!customer) return alert("Zəhmət olmasa adınızı yazın!");
            selectedTableId = id;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('resModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        // --- REZERV SORĞUSU (WhatsApp + Firebase Pending) ---
        function requestReservation() {
            const name = document.getElementById('customerName').value;
            const start = document.getElementById('startTime').value;
            const dur = document.getElementById('duration').value;
            
            // Bitiş vaxtını hesabla
            let [h, m] = start.split(':').map(Number);
            let totalMins = h * 60 + m + parseInt(dur);
            let end = Math.floor(totalMins/60).toString().padStart(2,'0') + ":" + (totalMins%60).toString().padStart(2,'0');

            const resId = Date.now(); // Unique ID

            // 1. Firebase-ə "Gözləmədə" olaraq yaz (Amma hələ masanı tam bağlamır, sadəcə qeyd yaradır)
            db.ref('reservations/' + resId).set({
                id: resId,
                customer: name,
                tableId: selectedTableId,
                start: start,
                end: end,
                status: 'pending',
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            // 2. WhatsApp-ı aç
            const waMsg = `Salam, Aristokrat! %0A${selectedTableId}-ci masanı rezerv etmək istəyirəm. %0AAd: ${name} %0ASaat: ${start} - ${end} %0A%0ATəsdiqləməyinizi gözləyirəm.`;
            window.open(`https://wa.me/994554828424?text=${waMsg}`, '_blank');
            
            closeModal();
            alert("Sorğunuz göndərildi. Təsdiq edildikdən sonra masa rezerv olunacaq.");
        }

        // --- ADMIN PANEL FUNKSİYALARI ---
        function toggleAdmin() {
            const pass = prompt("Admin Şifrəsi:");
            if(pass === "2026") {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function renderAdminList(data) {
            const list = document.getElementById('adminList');
            if(!data) { list.innerHTML = "Aktiv rezerv yoxdur."; return; }
            
            list.innerHTML = '';
            Object.values(data).forEach(r => {
                if(r.status === 'expired') return;
                list.innerHTML += `
                    <div class="res-item">
                        <span>${r.customer} - Masa ${r.tableId} (${r.start}-${r.end}) [${r.status}]</span>
                        <div>
                            ${r.status === 'pending' ? `<button onclick="confirmRes(${r.id})" style="color:lime; background:none; border:1px solid lime; cursor:pointer; padding:2px 5px; margin-right:5px;">Təsdiqlə</button>` : ''}
                            <button onclick="deleteRes(${r.id})" style="color:red; background:none; border:1px solid red; cursor:pointer; padding:2px 5px;">Sil</button>
                        </div>
                    </div>
                `;
            });
        }

        function confirmRes(id) { db.ref('reservations/' + id).update({ status: 'confirmed' }); }
        function deleteRes(id) { db.ref('reservations/' + id).remove(); }

    </script>
</body>
</html>

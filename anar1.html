<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristokrat | Premium Billiard Lounge</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(57, 255, 20, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a3a12 0%, #050505 80%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { padding: 3rem 0; }

        h1 {
            font-size: clamp(2.2rem, 10vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--neon-green);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.85rem;
            text-shadow: 0 0 5px var(--neon-green);
            margin-bottom: 2.5rem;
        }

        .user-info input {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 18px 30px;
            border-radius: 12px;
            color: white;
            width: 100%;
            max-width: 400px;
            text-align: center;
            outline: none;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Tables Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 1rem;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            text-align: left;
        }

        .table-card:hover { transform: translateY(-8px); border-color: var(--neon-green); }

        .card-image { width: 100%; height: 180px; overflow: hidden; background: #111; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .card-content { padding: 20px; }
        .card-content h3 { font-size: 1.4rem; margin-bottom: 5px; color: #fff; }
        .card-content p { font-size: 0.8rem; color: var(--neon-green); margin-bottom: 15px; }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .status-confirmed { border-color: #ff4444; color: #ff4444; background: rgba(255, 68, 68, 0.1); text-shadow: 0 0 5px #ff4444; }
        .status-pending { border-color: #ffcc00; color: #ffcc00; background: rgba(255, 204, 0, 0.1); }

        /* Viktoria Reklam - İncə */
        .ad-section { margin-top: 5rem; text-align: left; max-width: 800px; margin-left: auto; margin-right: auto; }
        .google-label {
            font-size: 10px;
            color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
            text-transform: uppercase;
            margin-bottom: 6px;
            letter-spacing: 4px;
            font-weight: bold;
        }
        .ad-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(57, 255, 20, 0.1);
            border-radius: 12px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }
        .ad-card h2 { font-size: 1.1rem; color: #fff; }
        .ad-card p { font-size: 0.8rem; color: #666; }
        .btn-ad {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 7px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-ad:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Footer */
        .footer { margin-top: 5rem; padding: 40px 20px; border-top: 1px solid rgba(57, 255, 20, 0.05); }
        .footer-brand {
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            font-size: 1rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .footer-copy { color: rgba(57, 255, 20, 0.3); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Admin Panel */
        #adminPanel {
            display: none;
            background: #0a0a0a;
            border: 1px solid var(--neon-green);
            margin: 30px auto;
            padding: 25px;
            border-radius: 20px;
            text-align: left;
            max-width: 650px;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.1);
        }
        .res-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .res-info { font-size: 0.85rem; color: #eee; }
        .res-info b { color: var(--neon-green); }
        .admin-btns button {
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.7rem;
            margin-left: 8px;
            text-transform: uppercase;
        }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; padding: 35px; border: 1px solid var(--neon-green); border-radius: 25px; width: 90%; max-width: 420px; }
        .btn-main { background: var(--neon-green); color: #000; border: none; padding: 16px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); }

        #loginModal { z-index: 2000; }
        .input-dark { width:100%; padding:14px; background:#111; border:1px solid #222; color:white; border-radius:10px; margin-top:8px; outline:none; }
        .input-dark:focus { border-color: var(--neon-green); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARISTOKRAT</h1>
            <p class="subtitle">Premium Billiard & Lounge</p>
            <div class="user-info">
                <input type="text" id="customerName" placeholder="ADINIZI DAXİL EDİN...">
            </div>
        </header>

        <div class="tables-grid" id="tablesGrid">
            <!-- Masalar JavaScript ilə bura gələcək -->
        </div>

        <!-- Viktoria Reklam -->
        <div class="ad-section">
            <p class="google-label">Google Reklam</p>
            <div class="ad-card">
                <div>
                    <h2>Viktoria Paltar Boyaları</h2>
                    <p>Geyimlərinizə parlaq və yeni həyat verin.</p>
                </div>
                <a href="https://viktoria-az.store" target="_blank" class="btn-ad">SAYTA KEÇİD</a>
            </div>
        </div>

        <footer class="footer">
            <!-- Admin Girişi: Bu yazıya 3 dəfə dalbadal klikləyin -->
            <div class="footer-brand" onclick="handleAdminClick()">ARISTOKRAT</div>
            <p class="footer-copy">Bütün haqları qorunur © 2026</p>
            
            <div id="adminPanel">
                <h3 style="color: var(--neon-green); margin-bottom: 20px; font-size: 1.1rem; letter-spacing: 2px;">İDARƏETMƏ PANELI</h3>
                <div id="adminList">Məlumat yüklənir...</div>
                <button onclick="document.getElementById('adminPanel').style.display='none'" style="margin-top:20px; background:none; border:none; color:#444; cursor:pointer; font-size:0.7rem; text-decoration: underline;">PANELİ GİZLƏ</button>
            </div>
        </footer>
    </div>

    <!-- Rezerv Modalı -->
    <div id="resModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--neon-green); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px;">Masa Seçin</h2>
            <div style="text-align: left;">
                <label style="font-size: 0.75rem; color: #666; font-weight: bold;">BAŞLANĞIC SAATI</label>
                <input type="time" id="startTime" value="20:00" class="input-dark">
                
                <label style="display:block; margin-top:20px; font-size: 0.75rem; color: #666; font-weight: bold;">MÜDDƏT SEÇİN</label>
                <select id="duration" class="input-dark">
                    <option value="60">1 Saat</option>
                    <option value="90">1 Saat 30 Dəq</option>
                    <option value="120">2 Saat</option>
                    <option value="180">3 Saat</option>
                </select>
            </div>
            <button class="btn-main" onclick="requestReservation()">WhatsApp İlə Göndər</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer; width:100%; font-size: 0.75rem;">LƏĞV ET</button>
        </div>
    </div>

    <!-- Şifrə Modalı -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--neon-green); margin-bottom: 20px; letter-spacing: 2px;">SİSTEMƏ GİRİŞ</h3>
            <input type="password" id="adminPass" placeholder="Şifrəni yazın" class="input-dark" style="text-align: center; font-size: 1.2rem; letter-spacing: 5px;">
            <button class="btn-main" onclick="checkAdminPass()">DAXİL OL</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; width:100%; font-size: 0.75rem;">GERİ</button>
        </div>
    </div>

    <script>
        // --- FIREBASE SETUP ---
        const firebaseConfig = { databaseURL: "https://aristokrat-billiard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedTableId = null;
        let adminClickCount = 0;

        const tables = [
            { id: 1, name: "Masa 1", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1609132718484-cc90df3417f8?q=80&w=500" },
            { id: 2, name: "Masa 2", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?q=80&w=500" },
            { id: 3, name: "Masa 3", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1574672039761-3957d8a1bcc3?q=80&w=500" },
            { id: 4, name: "Masa 4", type: "Amerikan Pool", img: "https://images.unsplash.com/photo-1538321469612-4110439863e0?q=80&w=500" },
            { id: 5, name: "Tennis 1", type: "Masa Tennisi", img: "https://images.unsplash.com/photo-1534158914592-062992fbe900?q=80&w=500" }
        ];

        // --- İLK RENDER ---
        function initialRender() {
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = tables.map(t => `
                <div class="table-card" onclick="openModal(${t.id}, '${t.name}')">
                    <div class="card-image"><img src="${t.img}"></div>
                    <div class="card-content">
                        <h3>${t.name}</h3>
                        <p>${t.type}</p>
                        <div id="st-container-${t.id}"><span class="status-badge">Mövcuddur</span></div>
                    </div>
                </div>
            `).join('');
        }

        // --- REAL-TIME DATA ---
        db.ref('reservations').on('value', (snapshot) => {
            const data = snapshot.val();
            updateTableStatuses(data);
            updateAdminPanel(data);
        });

        function updateTableStatuses(resData) {
            tables.forEach(t => {
                const container = document.getElementById(`st-container-${t.id}`);
                const active = Object.values(resData || {}).find(r => r.tableId === t.id);
                
                if (active) {
                    if (active.status === 'confirmed') {
                        container.innerHTML = `<span class="status-badge status-confirmed">DOLUDUR: ${active.start}-${active.end}</span>`;
                    } else {
                        container.innerHTML = `<span class="status-badge status-pending">Təsdiq Gözlənilir</span>`;
                    }
                } else {
                    container.innerHTML = `<span class="status-badge">Mövcuddur</span>`;
                }
            });
        }

        // --- REZERV FUNKSİYALARI ---
        function openModal(id, name) {
            if(!document.getElementById('customerName').value.trim()) {
                alert("Zəhmət olmasa əvvəlcə adınızı daxil edin!");
                return;
            }
            selectedTableId = id;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('resModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        function requestReservation() {
            const name = document.getElementById('customerName').value;
            const start = document.getElementById('startTime').value;
            const dur = document.getElementById('duration').value;
            let [h, m] = start.split(':').map(Number);
            let totalMins = h * 60 + m + parseInt(dur);
            let end = Math.floor(totalMins/60).toString().padStart(2,'0') + ":" + (totalMins%60).toString().padStart(2,'0');

            const resId = Date.now();
            db.ref('reservations/' + resId).set({ id: resId, customer: name, tableId: selectedTableId, start, end, status: 'pending' });

            const waMsg = `Aristokrat Rezerv:%0AAd: ${name}%0AMasa: ${selectedTableId}%0AVaxt: ${start} - ${end}`;
            window.open(`https://wa.me/994554828424?text=${waMsg}`, '_blank');
            closeModal();
        }

        // --- ADMIN İDARƏETMƏ ---
        function handleAdminClick() {
            adminClickCount++;
            if(adminClickCount === 3) {
                document.getElementById('loginModal').style.display = 'flex';
                adminClickCount = 0;
            }
            setTimeout(() => { adminClickCount = 0; }, 2000);
        }

        function checkAdminPass() {
            if(document.getElementById('adminPass').value === "2026") {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminPass').value = '';
                document.getElementById('adminPanel').scrollIntoView({behavior:'smooth'});
            } else {
                alert("Şifrə yanlışdır!");
            }
        }

        function updateAdminPanel(data) {
            const list = document.getElementById('adminList');
            if(!data) { list.innerHTML = "<p style='color:#444;'>Aktiv sifariş yoxdur.</p>"; return; }
            
            list.innerHTML = Object.values(data).map(r => `
                <div class="res-item">
                    <div class="res-info">
                        Masa <b>${r.tableId}</b>: ${r.customer} <br>
                        <small style="color:#888;">${r.start} - ${r.end} (${r.status === 'pending' ? 'Gözləyir' : 'Təsdiqli'})</small>
                    </div>
                    <div class="admin-btns">
                        ${r.status === 'pending' ? `<button onclick="confirmOrder(${r.id})" style="background:lime; color:#000; border:none;">OK</button>` : ''}
                        <button onclick="deleteOrder(${r.id})" style="background:#ff4444; color:#fff; border:none;">SİL</button>
                    </div>
                </div>
            `).join('');
        }

        function confirmOrder(id) { db.ref('reservations/' + id).update({ status: 'confirmed' }); }
        function deleteOrder(id) { if(confirm("Bu rezervasiyanı silmək istəyirsiniz?")) db.ref('reservations/' + id).remove(); }

        initialRender();
    </script>
</body>
</html>

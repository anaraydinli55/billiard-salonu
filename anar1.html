<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aristokrat | Premium Billiard Lounge</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (Real-time Database üçün) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --neon-green: #39FF14;
            --dark-bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(57, 255, 20, 0.2);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--dark-bg);
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #1a3a12 0%, #050505 80%);
            min-height: 100vh;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1609132718484-cc90df3417f8?q=80&w=2070') center/cover no-repeat;
            opacity: 0.1;
            z-index: -1;
            filter: grayscale(100%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; text-align: center; }

        header { padding: 3rem 0; }

        h1 {
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-green), 0 0 30px var(--neon-green);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--neon-green);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
            text-shadow: 0 0 5px var(--neon-green);
            margin-bottom: 2.5rem;
        }

        .user-info input {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 18px 30px;
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            outline: none;
            backdrop-filter: blur(10px);
            margin-bottom: 2rem;
            transition: 0.3s;
        }
        .user-info input:focus { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); }

        /* Tables Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 1rem;
        }

        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            overflow: hidden;
            transition: var(--transition);
            cursor: pointer;
            text-align: left;
        }
        .table-card:hover { transform: translateY(-10px); border-color: var(--neon-green); }

        .card-image { width: 100%; height: 200px; overflow: hidden; background: #111; }
        .card-image img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .table-card:hover .card-image img { opacity: 1; transform: scale(1.05); }

        .card-content { padding: 25px; }
        .card-content h3 { font-size: 1.5rem; margin-bottom: 5px; color: #fff; letter-spacing: 1px; }
        .card-content p { font-size: 0.85rem; color: var(--neon-green); margin-bottom: 15px; }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 900;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            text-transform: uppercase;
        }

        /* Dolu Masa Stili */
        .status-confirmed { 
            border-color: #ff4444; 
            color: #ff4444; 
            background: rgba(255, 68, 68, 0.15); 
            text-shadow: 0 0 5px #ff4444; 
        }
        .status-pending { border-color: #ffcc00; color: #ffcc00; background: rgba(255, 204, 0, 0.1); }

        /* Viktoria Reklam */
        .ad-section { margin-top: 5rem; text-align: left; max-width: 850px; margin-left: auto; margin-right: auto; }
        .google-label { font-size: 10px; color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold; }
        .ad-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(57, 255, 20, 0.1);
            border-radius: 15px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }
        .ad-card h2 { font-size: 1.1rem; color: #fff; }
        .ad-card p { font-size: 0.85rem; color: #666; }
        .btn-ad { border: 1px solid var(--neon-green); color: var(--neon-green); padding: 8px 20px; border-radius: 8px; text-decoration: none; font-size: 0.75rem; font-weight: bold; transition: 0.3s; }
        .btn-ad:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Footer */
        .footer { margin-top: 5rem; padding: 50px; border-top: 1px solid rgba(57, 255, 20, 0.05); }
        .footer-brand {
            color: var(--neon-green);
            text-shadow: 0 0 15px var(--neon-green);
            font-size: 1.1rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            display: inline-block;
            transition: 0.3s;
        }
        .footer-brand:hover { transform: scale(1.05); }
        .footer-copy { color: rgba(57, 255, 20, 0.3); font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; padding: 40px; border: 1px solid var(--neon-green); border-radius: 30px; width: 90%; max-width: 420px; }
        .btn-main { background: var(--neon-green); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }

        .input-dark { width:100%; padding:15px; background:#111; border:1px solid #222; color:white; border-radius:12px; margin-top:10px; outline:none; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        <header>
            <h1>ARISTOKRAT</h1>
            <p class="subtitle">Premium Billiard & Lounge</p>
            <div class="user-info">
                <input type="text" id="customerName" placeholder="ADINIZI DAXİL EDİN...">
            </div>
        </header>

        <!-- Masalar Grid -->
        <div class="tables-grid" id="tablesGrid">
            <!-- Masalar JavaScript vasitəsilə bura yüklənir -->
        </div>

        <!-- Viktoria Reklam -->
        <div class="ad-section">
            <p class="google-label">Google Reklam</p>
            <div class="ad-card">
                <div>
                    <h2>Viktoria Paltar Boyaları</h2>
                    <p>Geyimlərinizə parlaq və yeni həyat verin.</p>
                </div>
                <a href="https://viktoria-az.store" target="_blank" class="btn-ad">SAYTA KEÇİD</a>
            </div>
        </div>

        <footer class="footer">
            <!-- Admin Girişi: Bu yazıya 3 dəfə sürətlə klikləyin -->
            <div class="footer-brand" id="adminTrigger">ARISTOKRAT</div>
            <p class="footer-copy">Bütün haqları qorunur © 2026</p>
        </footer>
    </div>

    <!-- Rezerv Modalı -->
    <div id="resModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--neon-green); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px;">Masa Seçin</h2>
            <div style="text-align: left;">
                <label style="font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase;">Başlanğıc Saatı</label>
                <input type="time" id="startTime" value="20:00" class="input-dark">
                
                <label style="display:block; margin-top:20px; font-size: 0.75rem; color: #666; font-weight: bold; text-transform: uppercase;">Müddət Seçin</label>
                <select id="duration" class="input-dark">
                    <option value="60">1 Saat</option>
                    <option value="90">1 Saat 30 Dəq</option>
                    <option value="120">2 Saat</option>
                    <option value="180">3 Saat</option>
                </select>
            </div>
            <button class="btn-main" onclick="requestReservation()">WhatsApp İlə Göndər</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; width:100%; font-size: 0.8rem;">LƏĞV ET</button>
        </div>
    </div>

    <script>
        // --- FIREBASE KONFİQURASİYA ---
        const firebaseConfig = { databaseURL: "https://aristokrat-billiard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedTableId = null;
        let adminClickCount = 0;

        // Masa Məlumatları
        const tables = [
            { id: 1, name: "Masa 1", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1609132718484-cc90df3417f8?q=80&w=500" },
            { id: 2, name: "Masa 2", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1544197150-b99a580bb7a8?q=80&w=500" },
            { id: 3, name: "Masa 3", type: "Rus Bilyardı", img: "https://images.unsplash.com/photo-1574672039761-3957d8a1bcc3?q=80&w=500" },
            { id: 4, name: "Masa 4", type: "Amerikan Pool", img: "https://images.unsplash.com/photo-1538321469612-4110439863e0?q=80&w=500" },
            { id: 5, name: "Tennis 1", type: "Masa Tennisi", img: "https://images.unsplash.com/photo-1534158914592-062992fbe900?q=80&w=500" }
        ];

        // Masaları Render Etmək
        function initialRender() {
            const grid = document.getElementById('tablesGrid');
            grid.innerHTML = tables.map(t => `
                <div class="table-card" onclick="openModal(${t.id}, '${t.name}')">
                    <div class="card-image"><img src="${t.img}" alt="${t.name}"></div>
                    <div class="card-content">
                        <h3>${t.name}</h3>
                        <p>${t.type}</p>
                        <div id="status-container-${t.id}">
                            <span class="status-badge">Mövcuddur</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Real-Time Verilənləri Dinləmək
        db.ref('reservations').on('value', (snapshot) => {
            const data = snapshot.val();
            updateStatuses(data);
        });

        function updateStatuses(resData) {
            tables.forEach(t => {
                const container = document.getElementById(`status-container-${t.id}`);
                // Bu masa üçün aktiv rezervi tapırıq
                const activeRes = Object.values(resData || {}).find(r => r.tableId === t.id);
                
                if (activeRes) {
                    if (activeRes.status === 'confirmed') {
                        container.innerHTML = `<span class="status-badge status-confirmed">RESERV: ${activeRes.start} - ${activeRes.end}</span>`;
                    } else {
                        container.innerHTML = `<span class="status-badge status-pending">Təsdiq Gözlənilir</span>`;
                    }
                } else {
                    container.innerHTML = `<span class="status-badge">Mövcuddur</span>`;
                }
            });
        }

        // Modal Funksiyaları
        function openModal(id, name) {
            const customer = document.getElementById('customerName').value.trim();
            if(!customer) {
                alert("Zəhmət olmasa əvvəlcə adınızı daxil edin!");
                window.scrollTo({top: 0, behavior: 'smooth'});
                return;
            }
            selectedTableId = id;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('resModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('resModal').style.display = 'none'; }

        // Rezervasiya Sorğusu Göndərmək
        function requestReservation() {
            const name = document.getElementById('customerName').value;
            const start = document.getElementById('startTime').value;
            const dur = document.getElementById('duration').value;
            
            // Bitiş vaxtını hesablamaq
            let [h, m] = start.split(':').map(Number);
            let totalMins = h * 60 + m + parseInt(dur);
            let end = Math.floor(totalMins/60).toString().padStart(2,'0') + ":" + (totalMins%60).toString().padStart(2,'0');

            const resId = Date.now();

            // Firebase-ə "pending" (gözləmədə) olaraq qeyd edirik
            db.ref('reservations/' + resId).set({
                id: resId,
                customer: name,
                tableId: selectedTableId,
                start: start,
                end: end,
                status: 'pending'
            });

            // WhatsApp-ı açmaq
            const waMsg = `Salam, Aristokrat! %0A${selectedTableId}-ci masanı rezerv etmək istəyirəm. %0AAd: ${name} %0ASaat: ${start} - ${end}`;
            window.open(`https://wa.me/994554828424?text=${waMsg}`, '_blank');
            
            closeModal();
        }

        // --- ADMİN KEÇİD MƏNTİQİ (3 KLİK) ---
        document.getElementById('adminTrigger').onclick = function() {
            adminClickCount++;
            if (adminClickCount === 3) {
                window.location.href = "admin/index.html"; // Admin qovluğundakı səhifəyə yönləndirir
                adminClickCount = 0;
            }
            // 2 saniyə ərzində 3 klik olmazsa, sayğacı sıfırla
            setTimeout(() => { adminClickCount = 0; }, 2000);
        };

        // Səhifə yüklənəndə masaları göstər
        initialRender();

        // Modal kənarına kliklədikdə bağlansın
        window.onclick = function(e) {
            if (e.target == document.getElementById('resModal')) closeModal();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Aristokrat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #39FF14; text-shadow: 0 0 10px #39FF14; text-align: center; margin-bottom: 40px; letter-spacing: 3px; }
        .res-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .info b { color: #39FF14; font-size: 1.2rem; }
        .status-text { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .pending { color: #ffcc00; }
        .confirmed { color: #ff4444; }
        .btns button {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
            border: none;
            text-transform: uppercase;
        }
        .btn-ok { background: #39FF14; color: #000; }
        .btn-del { background: #ff4444; color: #fff; }
        .back-btn { display: block; text-align: center; color: #555; text-decoration: none; margin-top: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>IDARƏETMƏ PANELI</h1>
        <div id="adminList">Yüklənir...</div>
        <a href="../index.html" class="back-btn">← ANA SƏHİFƏYƏ QAYIT</a>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://aristokrat-billiard-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('reservations').on('value', (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('adminList');
            if(!data) { list.innerHTML = "<p style='text-align:center; color:#444;'>Sifariş yoxdur.</p>"; return; }
            
            list.innerHTML = Object.values(data).map(r => `
                <div class="res-card">
                    <div class="info">
                        <b>Masa ${r.tableId}</b><br>
                        <span>Müştəri: ${r.customer}</span><br>
                        <span>Vaxt: ${r.start} - ${r.end}</span><br>
                        <span class="status-text ${r.status}">${r.status === 'pending' ? 'Təsdiq Gözləyir' : 'Təsdiqlənib'}</span>
                    </div>
                    <div class="btns">
                        ${r.status === 'pending' ? `<button class="btn-ok" onclick="confirmRes(${r.id})">Təsdiqlə</button>` : ''}
                        <button class="btn-del" onclick="deleteRes(${r.id})">Sil</button>
                    </div>
                </div>
            `).join('');
        });

        function confirmRes(id) { db.ref('reservations/' + id).update({ status: 'confirmed' }); }
        function deleteRes(id) { if(confirm("Silmək istədiyinizdən əminsiniz?")) db.ref('reservations/' + id).remove(); }
    </script>
</body>
</html>
